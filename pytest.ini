[pytest]
; This machine's system temp dir (%TEMP%\pytest-of-<user>) is owned by an
; unrelated sandboxing tool and inaccessible to this user (WinError 5), which
; breaks every test using the tmp_path fixture. Keep pytest's temp root
; inside the repo instead; .pytest_tmp/ is gitignored.
addopts = --basetemp=.pytest_tmp
